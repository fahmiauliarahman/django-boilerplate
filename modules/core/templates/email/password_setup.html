<!doctype html>
<html lang="en">
<body style="background:#f4f4f5;font-family:Arial,sans-serif;margin:0;padding:32px 16px;color:#18181b">
    <div style="background:#ffffff;border:1px solid #e4e4e7;border-radius:12px;margin:0 auto;max-width:560px;padding:32px">
        <h1 style="font-size:24px;margin:0 0 24px">Welcome!</h1>
        <p>Hi {{ user.get_username }},</p>
        <p>Your account is ready. Create your password to get started.</p>
        <p style="margin:28px 0">
            <a href="{{ setup_url }}" style="background:#6d28d9;border-radius:8px;color:#ffffff;display:inline-block;font-weight:600;padding:12px 20px;text-decoration:none">Create password</a>
        </p>
        <p style="color:#52525b;font-size:14px">If the button does not work, open this link:</p>
        <p style="font-size:14px;overflow-wrap:anywhere"><a href="{{ setup_url }}">{{ setup_url }}</a></p>
        <hr style="border:0;border-top:1px solid #e4e4e7;margin:28px 0">
        <p style="color:#71717a;font-size:13px;margin:0">If you were not expecting this account, ignore this email. This link can only be used once.</p>
    </div>
</body>
</html>
