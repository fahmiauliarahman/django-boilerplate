<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set password</title>
</head>
<body>
    <main>
        <h1>Set password</h1>
        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Save password</button>
            </form>
        {% else %}
            <p>This password setup link is invalid or has expired.</p>
        {% endif %}
    </main>
</body>
</html>
