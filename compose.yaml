services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DEBUG: "False"
      POSTGRES_HOST: db
    command: sh -c ".venv/bin/python manage.py migrate && .venv/bin/python manage.py collectstatic --noinput && .venv/bin/gunicorn --config gunicorn.conf.py app.wsgi:application --bind 0.0.0.0:8001"
    expose:
      - "8001"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          ".venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen(urllib.request.Request('http://localhost:8001/health/', headers={'X-Forwarded-Proto': 'https'}))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  media:
  postgres:
