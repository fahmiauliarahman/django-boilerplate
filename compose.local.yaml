services:
  certificates:
    image: alpine/openssl@sha256:3da6a24cdaa2f2ac8ef4defb322249fae6159983104653a9e5312f5b75dac7af
    command:
      - req
      - -x509
      - -newkey
      - rsa:2048
      - -nodes
      - -days
      - "365"
      - -subj
      - /CN=localhost
      - -addext
      - subjectAltName=DNS:localhost,IP:127.0.0.1
      - -keyout
      - /certs/localhost.key
      - -out
      - /certs/localhost.crt
    volumes:
      - certificates:/certs

  nginx:
    image: nginx:1.29-alpine@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
    restart: unless-stopped
    ports:
      - "8000:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certificates:/etc/nginx/certs:ro
    depends_on:
      certificates:
        condition: service_completed_successfully
      web:
        condition: service_healthy

volumes:
  certificates:
