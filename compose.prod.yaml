services:
  nginx:
    image: nginx:1.29-alpine@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      NGINX_ENVSUBST_FILTER: ^DOMAIN$
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
